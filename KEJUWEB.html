<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Search</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
}

.logo{
    font-size:60px;
    font-weight:bold;
    color:#4285F4;
    margin-bottom:20px;
}

.search-box{
    width:500px;
    max-width:90%;
}

.search-box input{
    width:100%;
    padding:14px;
    border-radius:30px;
    border:1px solid #ddd;
    font-size:16px;
    outline:none;
}

.buttons{
    margin-top:20px;
}

button{
    padding:10px 18px;
    border:none;
    background:#f8f9fa;
    margin:5px;
    cursor:pointer;
    border-radius:4px;
}

button:hover{
    border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="logo">MyGoogle</div>

<div class="search-box">
<input id="searchInput" type="text" placeholder="Search the web...">
</div>

<div class="buttons">
<button onclick="search()">Search</button>
<button onclick="lucky()">I'm Feeling Lucky</button>
</div>

<script>
function search(){
    let query = document.getElementById("searchInput").value;
    window.location.href = "https://www.google.com/search?q=" + query;
}

function lucky(){
    let query = document.getElementById("searchInput").value;
    window.location.href = "https://www.google.com/search?btnI=I&q=" + query;
}
</script>

</body>
</html>
